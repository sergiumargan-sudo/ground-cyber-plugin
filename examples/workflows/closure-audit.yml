# Example: weekly Ground Cyber closure audit for the current repository.
#
# Copy this file to .github/workflows/closure-audit.yml in your repository.
#
# Token notes:
# - The default GITHUB_TOKEN works for SINGLE-REPOSITORY audits on repos
#   where GitHub Advanced Security / secret scanning is enabled, with the
#   `security-events: read` permission below.
# - ORGANIZATION-level audits (`org:` input) need a fine-grained PAT or
#   GitHub App token with organization-wide "Secret scanning alerts: read"
#   access. Store it as a secret (e.g. GC_AUDIT_TOKEN) and pass it as
#   GITHUB_TOKEN to the action.

name: Ground Cyber Closure Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read
  security-events: read

jobs:
  closure-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Ground Cyber
        uses: sergiumargan-sudo/ground-cyber-plugin@main
        with:
          # Audits the current repository by default. For an org-wide audit:
          # org: "example-org"   (requires a PAT/App token; see notes above)
          output: "markdown,json"
          fail-on-gcs3: "false"
          fail-on-gcs4: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # For org-level audits use a dedicated read-only token instead:
          # GITHUB_TOKEN: ${{ secrets.GC_AUDIT_TOKEN }}
