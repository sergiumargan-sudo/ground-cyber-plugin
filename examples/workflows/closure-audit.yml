# Example: weekly Ground Cyber closure audit for the current repository.
#
# Copy this file to .github/workflows/closure-audit.yml in your repository.
#
# Token notes:
# - The default GITHUB_TOKEN CANNOT read secret-scanning or Dependabot
#   alerts (403: Resource not accessible by integration). Create a
#   fine-grained PAT with "Secret scanning alerts: read" (and Dependabot/
#   code-scanning read if auditing those families) for the repos or org in
#   scope, store it as a secret (e.g. GC_AUDIT_TOKEN), and pass it as
#   GITHUB_TOKEN to the action, as shown below.

name: Ground Cyber Closure Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read
  security-events: read

jobs:
  closure-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Ground Cyber
        uses: sergiumargan-sudo/ground-cyber-plugin@main
        with:
          # Audits the current repository by default. For an org-wide audit:
          # org: "example-org"   (requires a PAT/App token; see notes above)
          output: "markdown,json"
          fail-on-gcs3: "false"
          fail-on-gcs4: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GC_AUDIT_TOKEN }}
